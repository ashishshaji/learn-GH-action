name: Step Outputs -> Job Outputs

on:
  workflow_dispatch:
  push:
    branches :
      - main

    

jobs:
  build:
    runs-on: ubuntu-latest

    # Expose step outputs as job outputs
    outputs:
      image: ${{ steps.build.outputs.image }}
      version: ${{ steps.build.outputs.version }}

    steps:
      - name: Generate Build Information
        id: build
        run: |
          echo "image=myapp" >> $GITHUB_OUTPUT
          echo "version=1.0.0" >> $GITHUB_OUTPUT

      - name: Read Step Outputs
        run: |
          echo "Image  : ${{ steps.build.outputs.image }}"
          echo "Version: ${{ steps.build.outputs.version }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Read Job Outputs
        run: |
          echo "Image   : ${{ needs.build.outputs.image }}"
          echo "Version : ${{ needs.build.outputs.version }}"

      - name: Simulate Deployment
        run: |
          echo "Deploying ${{ needs.build.outputs.image }}:${{ needs.build.outputs.version }}"
