name: Matrix Example

on:
  workflow_dispatch:

jobs:

  test:

    strategy:

      fail-fast: false

      matrix:

        node:

          - 18
          - 20

        os:

          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

        with:
          node-version: ${{ matrix.node }}

      - run: node --version
