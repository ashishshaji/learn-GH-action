name: CI/CD Demo Pipeline

on:
  workflow_dispatch:

env:
  APP_NAME: demo-app
  NODE_VERSION: "20"

permissions:
  contents: read

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    outputs:
      artifact-name: ${{ steps.package.outputs.artifact }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Display Environment Information
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Actor: ${{ github.actor }}"
          echo "Workflow: ${{ github.workflow }}"

      - name: Install Dependencies
        run: |
          echo "Installing dependencies..."

      - name: Run Linter
        run: |
          echo "Running lint checks..."

      - name: Run Unit Tests
        run: |
          echo "Executing unit tests..."

      - name: Build Application
        run: |
          echo "Building application..."

      - name: Package Build
        id: package
        run: |
          mkdir -p artifact
          echo "Dummy build artifact" > artifact/app.txt
          echo "artifact=demo-build" >> $GITHUB_OUTPUT

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-build
          path: artifact/

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: build

    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://example.com

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: demo-build
          path: artifact/

      - name: Verify Artifact
        run: |
          ls -la artifact
          cat artifact/app.txt

      - name: Configure Deployment Credentials
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Configuring deployment credentials..."

      - name: Deploy Application
        run: |
          echo "Deploying application to Production..."
          sleep 5
          echo "Deployment Successful!"

      - name: Smoke Test
        run: |
          echo "Running smoke tests..."
          echo "Application is healthy."

      - name: Notify Success
        if: success()
        run: |
          echo "Deployment completed successfully."

      - name: Notify Failure
        if: failure()
        run: |
          echo "Deployment failed."

      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning temporary files..."
